name: Android CI

on:
  push:
    branches: [ main, phase-1-core-messaging ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build (production debug)
        run: ./gradlew assembleProductionDebug

      - name: Unit tests
        run: ./gradlew testProductionDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rcq-debug-apk
          path: app/build/outputs/apk/production/debug/*.apk
          retention-days: 7
