name: Android CI

on:
  push:
    branches: [ main, develop, phase-* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: false

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk \
           app/build/outputs/apk/debug/rcq-debug.apk

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --continue || true

    - name: Run lint
      run: ./gradlew lintDebug --continue || true

    # Upload as artifact (zip — only useful for CI inspection, NOT for phone install)
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: rcq-debug-apk
        path: app/build/outputs/apk/debug/rcq-debug.apk
        if-no-files-found: warn

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html
        if-no-files-found: ignore

    # ── Direct .apk download via GitHub Release ───────────────────────────────
    # Artifact downloads are always zipped by GitHub — Android can't install
    # a .zip. A Release asset downloads as a bare .apk you can tap and install.
    # The "latest-debug" pre-release is overwritten on every push.
    - name: Publish APK to GitHub Release (tap-to-install on Android)
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-debug
        name: "Latest Debug Build"
        prerelease: true
        body: |
          🤖 Auto-built from `${{ github.ref_name }}` @ ${{ github.sha }}

          ## Install on your phone

          1. **Download `rcq-debug.apk`** (link below ↓)
          2. Open the file on your phone — tap **Install**
          3. If blocked: **Settings → Apps → Special app access → Install unknown apps**
             → enable for your browser or Files app, then try again

          Works on Samsung S22, Pixel, and all Android 8.0+ devices.
        files: app/build/outputs/apk/debug/rcq-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
