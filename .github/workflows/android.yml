name: Android CI

on:
  push:
    branches: [ main, develop, phase-* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: false

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Cache the debug keystore so every build is signed with the same key.
    # Without this, each fresh runner generates a new keystore, making the
    # signature change between builds — Android then refuses to install the
    # update over a previously installed version.
    - name: Cache Android debug keystore
      uses: actions/cache@v4
      with:
        path: ~/.android/debug.keystore
        key: android-debug-keystore-v1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk \
           app/build/outputs/apk/debug/rcq-debug.apk

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --continue || true

    - name: Run lint
      run: ./gradlew lintDebug --continue || true

    # Artifact = always a .zip on download. Only useful for inspecting build output.
    # Use the Release asset below to install on a phone.
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: rcq-debug-apk
        path: app/build/outputs/apk/debug/rcq-debug.apk
        if-no-files-found: warn

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html
        if-no-files-found: ignore

    # The Release asset downloads as a bare .apk — tap to install directly.
    # "latest-debug" is overwritten on every push to phase-* or main.
    - name: Publish APK to GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-debug
        name: "Latest Debug Build"
        prerelease: true
        body: |
          🤖 Built from `${{ github.ref_name }}` @ `${{ github.sha }}`

          ## How to install on your phone

          **⚠️ If you have an older version installed — uninstall it first.**
          (Android blocks installs when the signature changes between builds.)

          1. Tap **rcq-debug.apk** below to download
          2. Open **Files → Downloads**, tap the file → **Install**
          3. If Samsung blocks it: Settings → Apps → Special app access →
             Install unknown apps → enable for your Files app

          Works on all Android 8.0+ phones (arm64, arm32, x86).
        files: app/build/outputs/apk/debug/rcq-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
